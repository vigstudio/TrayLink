<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrayLink" />
  <meta name="theme-color" content="#0f0f12" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/api/pwa/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/api/pwa/icon-180.png" />
  <link rel="apple-touch-icon" href="/api/pwa/icon-180.png" />
  <title>TrayLink Remote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f12;
      --surface: #1a1a22;
      --tile: #22222e;
      --tile-active: #2a2a3a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --muted: #8888a0;
      --accent: #3b82f6;
      --success: #22c55e;
      --error: #ef4444;
      --tile-size: clamp(72px, 22vw, 96px);
      --gap: clamp(10px, 3vw, 16px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.15), transparent),
        var(--bg);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .header {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 140;
      text-align: center;
      padding: 0;
      pointer-events: none;
      width: max-content;
      max-width: calc(100vw - 120px - env(safe-area-inset-left) - env(safe-area-inset-right));
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 42px;
      white-space: nowrap;
    }

    .header p {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: -6px;
      line-height: 1;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.offline { background: var(--error); }

    .section {
      padding: 12px 20px 4px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--tile-size), 1fr));
      gap: var(--gap);
      padding: 58px 20px 24px;
    }

    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    .tile-inner {
      width: var(--tile-size);
      height: var(--tile-size);
      background: var(--tile);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      position: relative;
    }

    .tile:active .tile-inner,
    .tile.pressed .tile-inner {
      transform: scale(0.92);
      background: var(--tile-active);
    }

    .tile.success .tile-inner {
      box-shadow: 0 0 0 2px var(--success), 0 2px 12px rgba(34,197,94,0.3);
    }

    .tile.error .tile-inner {
      box-shadow: 0 0 0 2px var(--error), 0 2px 12px rgba(239,68,68,0.3);
    }

    .tile img {
      width: 58%;
      height: 58%;
      object-fit: contain;
      border-radius: 8px;
      pointer-events: none;
    }

    .tile .fallback-icon {
      width: 44%;
      height: 44%;
      opacity: 0.7;
    }

    .tile-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      max-width: calc(var(--tile-size) + 8px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
    }

    .empty {
      text-align: center;
      padding: 100px 24px 48px;
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60dvh;
      gap: 12px;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.8rem;
      max-width: calc(100vw - 40px);
      text-align: center;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: rgba(34,197,94,0.4); }
    .toast.error { border-color: rgba(239,68,68,0.4); }

    .token-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 200;
    }

    .token-overlay.hidden { display: none; }

    .token-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
    }

    .token-card h2 {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .token-card p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .token-card input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
    }

    .token-card input:focus { border-color: var(--accent); }

    .token-card button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .toolbar {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      right: calc(10px + env(safe-area-inset-right));
      display: flex;
      gap: 8px;
      z-index: 150;
    }

    .toolbar-left {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      left: calc(10px + env(safe-area-inset-left));
      display: flex;
      gap: 8px;
      z-index: 150;
    }

    .upload-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      z-index: 250;
    }

    .upload-overlay.hidden { display: none; }

    .upload-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }

    .upload-panel h2 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .upload-panel p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .upload-file-info {
      font-size: 0.85rem;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .upload-progress {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .upload-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s ease;
    }

    .upload-actions {
      display: flex;
      gap: 10px;
    }

    .upload-actions button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-upload {
      background: var(--accent);
      color: white;
    }

    .btn-upload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-cancel {
      background: var(--tile);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }

    .upload-options {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .upload-options input { accent-color: var(--accent); }

    #file-input { display: none; }

    .toolbar-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: rgba(26, 26, 34, 0.92);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }

    .toolbar-btn:active {
      transform: scale(0.94);
    }

    .toolbar-btn.active {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.55);
      color: #93c5fd;
    }

    .toolbar-btn svg {
      width: 20px;
      height: 20px;
    }

    .toolbar-btn.hidden {
      display: none;
    }

    html:fullscreen,
    html:-webkit-full-screen {
      background: var(--bg);
    }

    body.immersive {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body.immersive #app .header {
      display: none;
    }

    body.immersive #btn-install,
    html:fullscreen #btn-install,
    html:-webkit-full-screen #btn-install {
      display: none;
    }

    body.immersive .grid {
      min-height: calc(100dvh - 56px - env(safe-area-inset-top));
      padding-top: calc(52px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .toolbar-btn .icon-exit {
      display: none;
    }

    body.immersive .toolbar-btn#btn-fullscreen .icon-enter,
    html:fullscreen .toolbar-btn#btn-fullscreen .icon-enter,
    html:-webkit-full-screen .toolbar-btn#btn-fullscreen .icon-enter {
      display: none;
    }

    body.immersive .toolbar-btn#btn-fullscreen .icon-exit,
    html:fullscreen .toolbar-btn#btn-fullscreen .icon-exit,
    html:-webkit-full-screen .toolbar-btn#btn-fullscreen .icon-exit {
      display: block;
    }
  </style>
</head>
<body>
  <div class="toolbar-left">
    <button type="button" class="toolbar-btn" id="btn-upload" title="Upload file lên PC" aria-label="Upload file lên PC">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>
    <button type="button" class="toolbar-btn hidden" id="btn-install" title="Thêm shortcut" aria-label="Thêm shortcut TrayLink Remote">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="4" width="16" height="16" rx="3"/>
        <path d="M12 8v8"/>
        <path d="M8 12h8"/>
      </svg>
    </button>
  </div>

  <input type="file" id="file-input" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.md,.csv,.zip,.rar,.7z" multiple />

  <div id="upload-overlay" class="upload-overlay hidden">
    <div class="upload-panel">
      <h2>Upload lên PC</h2>
      <p>Ảnh, video, tài liệu sẽ được lưu vào thư mục Downloads/TrayLink trên máy tính.</p>
      <div id="upload-file-info" class="upload-file-info"></div>
      <div class="upload-progress"><div id="upload-progress-bar" class="upload-progress-bar"></div></div>
      <label class="upload-options">
        <input type="checkbox" id="upload-open-after" checked />
        Mở file sau khi upload
      </label>
      <div class="upload-actions">
        <button type="button" class="btn-cancel" id="upload-cancel">Hủy</button>
        <button type="button" class="btn-upload" id="upload-start" disabled>Bắt đầu</button>
      </div>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <button type="button" class="toolbar-btn" id="btn-fullscreen" title="Toàn màn hình" aria-label="Toàn màn hình">
      <svg class="icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <svg class="icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="M14 10l7-7"/><path d="M3 21l7-7"/>
      </svg>
    </button>
    <button type="button" class="toolbar-btn" id="btn-keep-awake" title="Giữ màn hình sáng" aria-label="Giữ màn hình sáng">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </div>

  <div id="token-overlay" class="token-overlay hidden">
    <div class="token-card">
      <h2>Nhập API Token</h2>
      <p>Server yêu cầu token để mở app. Nhập token từ Dashboard → Settings.</p>
      <input id="token-input" type="password" placeholder="API token" autocomplete="off" />
      <button id="token-submit">Tiếp tục</button>
    </div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Đang tải...</span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function loadToken() {
      const fromUrl = new URLSearchParams(location.search).get("token");
      if (fromUrl) {
        localStorage.setItem("traylink_token", fromUrl);
        return fromUrl;
      }
      return localStorage.getItem("traylink_token")
        || sessionStorage.getItem("traylink_token")
        || "";
    }

    function persistToken(value) {
      token = value.trim();
      if (!token) return;
      localStorage.setItem("traylink_token", token);
      sessionStorage.setItem("traylink_token", token);
      const url = new URL(location.href);
      url.searchParams.set("token", token);
      history.replaceState(null, "", url.pathname + url.search + url.hash);
    }

    function remoteQueryString() {
      const qs = new URLSearchParams(location.search);
      if (token && !qs.has("token")) qs.set("token", token);
      const s = qs.toString();
      return s ? `?${s}` : "";
    }

    function markHttpsPreferred() {
      localStorage.setItem("traylink_prefer_https", "1");
    }

    function maybeRedirectToHttps() {
      if (location.protocol === "https:") {
        markHttpsPreferred();
        return false;
      }
      const httpsUrl = httpsRemoteUrl();
      if (!httpsUrl) return false;
      const preferHttps = localStorage.getItem("traylink_prefer_https") === "1" || keepAwakeEnabled;
      if (preferHttps) {
        location.replace(httpsUrl);
        return true;
      }
      return false;
    }

    let token = loadToken();
    if (token) persistToken(token);
    let deckData = null;

    const toastEl = document.getElementById("toast");
    const appEl = document.getElementById("app");
    const tokenOverlay = document.getElementById("token-overlay");
    const tokenInput = document.getElementById("token-input");
    const tokenSubmit = document.getElementById("token-submit");
    const btnFullscreen = document.getElementById("btn-fullscreen");
    const btnKeepAwake = document.getElementById("btn-keep-awake");
    const btnInstall = document.getElementById("btn-install");
    const btnUpload = document.getElementById("btn-upload");
    const fileInput = document.getElementById("file-input");
    const uploadOverlay = document.getElementById("upload-overlay");
    const uploadFileInfo = document.getElementById("upload-file-info");
    const uploadProgressBar = document.getElementById("upload-progress-bar");
    const uploadStart = document.getElementById("upload-start");
    const uploadCancel = document.getElementById("upload-cancel");
    const uploadOpenAfter = document.getElementById("upload-open-after");

    let pendingFiles = [];
    let uploading = false;

    let screenWakeLock = null;
    let keepAwakeEnabled = localStorage.getItem("traylink_keep_awake") === "1";
    let noSleepVideo = null;
    let keepAwakeMonitor = null;
    let serverStatus = null;
    let immersiveMode = false;
    let deferredInstallPrompt = null;

    const wakeLockApiAvailable =
      window.isSecureContext && "wakeLock" in navigator && "request" in navigator.wakeLock;

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isMobile() {
      return isIOS() || isAndroid();
    }

    function isPwaInstalled() {
      if (window.matchMedia("(display-mode: standalone)").matches) return true;
      if (window.matchMedia("(display-mode: fullscreen)").matches) return true;
      if (window.navigator.standalone === true) return true;
      if (document.referrer.startsWith("android-app://")) return true;
      return false;
    }

    function canShowInstallButton() {
      if (isPwaInstalled()) return false;
      if (!isMobile()) return false;
      return true;
    }

    function updateInstallButton() {
      btnInstall.classList.toggle("hidden", !canShowInstallButton() || isExpandedView());
      if (deferredInstallPrompt) {
        btnInstall.title = "Thêm shortcut TrayLink Remote";
      } else if (!window.isSecureContext) {
        btnInstall.title = "Thêm shortcut — cần mở bằng HTTPS";
      } else if (isAndroid()) {
        btnInstall.title = "Thêm shortcut — Menu Chrome hoặc cài trực tiếp";
      } else {
        btnInstall.title = "Thêm vào Màn hình chính";
      }
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator) || !window.isSecureContext) return false;
      try {
        await navigator.serviceWorker.register("/sw.js", { scope: "/" });
        return true;
      } catch {
        return false;
      }
    }

    async function promptPwaInstall() {
      if (isPwaInstalled()) {
        updateInstallButton();
        return;
      }

      if (!window.isSecureContext) {
        const httpsUrl = httpsRemoteUrl();
        if (httpsUrl) {
          showToast("Cài app cần HTTPS — đang chuyển...", "success");
          window.setTimeout(() => location.replace(httpsUrl), 900);
        } else {
          showToast("Mở link HTTPS Remote Deck trên Dashboard để cài app", "error");
        }
        return;
      }

      await registerServiceWorker();

      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        updateInstallButton();
        if (choice.outcome === "accepted") {
          showToast("Đã cài TrayLink Remote", "success");
        }
        return;
      }

      if (isAndroid()) {
        showToast("Chrome: Menu ⋮ → Cài ứng dụng (hoặc Thêm vào Màn hình chính)", "success");
      } else if (isIOS()) {
        showToast("Safari: Chia sẻ → Thêm vào Màn hình chính", "success");
      }
    }

    function setupPwaInstall() {
      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        updateInstallButton();
      });

      window.addEventListener("appinstalled", () => {
        deferredInstallPrompt = null;
        updateInstallButton();
        showToast("Đã cài TrayLink Remote", "success");
      });

      window.matchMedia("(display-mode: standalone)").addEventListener("change", updateInstallButton);

      btnInstall.addEventListener("click", () => {
        promptPwaInstall();
      });

      registerServiceWorker().then(updateInstallButton);
      updateInstallButton();
    }

    function httpsRemoteUrl() {
      if (!serverStatus?.https_port) return null;
      const host = location.hostname || "127.0.0.1";
      return `https://${host}:${serverStatus.https_port}/remote${remoteQueryString()}`;
    }

    function showToast(msg, type = "success") {
      toastEl.textContent = msg;
      toastEl.className = "toast show " + type;
      clearTimeout(showToast._t);
      const duration = msg.length > 40 ? 4200 : 2200;
      showToast._t = setTimeout(() => { toastEl.className = "toast"; }, duration);
    }

    function vibrate(ms = 30) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function isNativeFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function isExpandedView() {
      return immersiveMode || isNativeFullscreen();
    }

    function updateFullscreenButton() {
      btnFullscreen.classList.toggle("active", isExpandedView());
      updateInstallButton();
    }

    function enterImmersiveMode() {
      immersiveMode = true;
      document.body.classList.add("immersive");
      updateFullscreenButton();
      window.scrollTo(0, 1);
      window.setTimeout(() => window.scrollTo(0, 0), 50);
      showToast("Đã bật chế độ toàn màn hình", "success");
    }

    function exitImmersiveMode() {
      immersiveMode = false;
      document.body.classList.remove("immersive");
      updateFullscreenButton();
    }

    async function enterNativeFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) {
        await el.requestFullscreen();
        return true;
      }
      if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
        return true;
      }
      return false;
    }

    async function exitNativeFullscreen() {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
        return;
      }
      if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }

    async function toggleFullscreen() {
      if (isExpandedView()) {
        exitImmersiveMode();
        if (isNativeFullscreen()) {
          try {
            await exitNativeFullscreen();
          } catch {}
        }
        updateFullscreenButton();
        return;
      }

      try {
        const ok = await enterNativeFullscreen();
        if (ok) {
          updateFullscreenButton();
          return;
        }
      } catch {}

      enterImmersiveMode();
    }

    async function requestScreenWakeLock() {
      if (!wakeLockApiAvailable) {
        return { ok: false, reason: "insecure", message: "Cần HTTPS" };
      }
      if (document.visibilityState !== "visible") {
        return { ok: false, reason: "hidden", message: "Tab không hiển thị" };
      }
      try {
        if (screenWakeLock && !screenWakeLock.released) {
          return { ok: true, mode: "wake-lock" };
        }
        screenWakeLock = await navigator.wakeLock.request("screen");
        screenWakeLock.addEventListener("release", () => {
          screenWakeLock = null;
          updateKeepAwakeButton();
          if (keepAwakeEnabled && document.visibilityState === "visible") {
            requestScreenWakeLock().then(updateKeepAwakeButton);
          }
        });
        return { ok: true, mode: "wake-lock" };
      } catch (err) {
        screenWakeLock = null;
        return {
          ok: false,
          reason: err?.name || "error",
          message: err?.message || String(err),
        };
      }
    }

    async function releaseScreenWakeLock() {
      if (screenWakeLock) {
        try {
          await screenWakeLock.release();
        } catch {}
        screenWakeLock = null;
      }
    }

    async function enableVideoNoSleep() {
      try {
        if (!noSleepVideo) {
          const video = document.createElement("video");
          video.setAttribute("playsinline", "");
          video.setAttribute("muted", "");
          video.setAttribute("loop", "");
          video.setAttribute("title", "No Sleep");
          video.style.cssText =
            "position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;left:0;top:0";
          video.src = "/api/nosleep.mp4";
          document.body.appendChild(video);
          noSleepVideo = video;
        }
        await noSleepVideo.play();
        return true;
      } catch {
        return false;
      }
    }

    function disableVideoNoSleep() {
      if (noSleepVideo) {
        noSleepVideo.pause();
        noSleepVideo.remove();
        noSleepVideo = null;
      }
    }

    async function renewKeepAwake() {
      if (!keepAwakeEnabled || document.visibilityState !== "visible") return false;

      let mode = null;
      if (wakeLockApiAvailable) {
        const wl = await requestScreenWakeLock();
        if (wl.ok) {
          mode = "wake-lock";
          disableVideoNoSleep();
          return true;
        }
      }

      const videoOk = await enableVideoNoSleep();
      if (videoOk) {
        mode = "video";
        return true;
      }

      return false;
    }

    async function releaseKeepAwake() {
      await releaseScreenWakeLock();
      disableVideoNoSleep();
    }

    function isKeepAwakeActive() {
      return (
        (screenWakeLock && !screenWakeLock.released) ||
        (noSleepVideo && !noSleepVideo.paused)
      );
    }

    function startKeepAwakeMonitor() {
      if (keepAwakeMonitor) return;
      keepAwakeMonitor = setInterval(() => {
        if (keepAwakeEnabled && document.visibilityState === "visible" && !isKeepAwakeActive()) {
          renewKeepAwake().then(updateKeepAwakeButton);
        }
      }, 5000);
    }

    function stopKeepAwakeMonitor() {
      if (keepAwakeMonitor) {
        clearInterval(keepAwakeMonitor);
        keepAwakeMonitor = null;
      }
    }

    function updateKeepAwakeButton() {
      btnKeepAwake.classList.toggle("active", keepAwakeEnabled);
      if (!keepAwakeEnabled) {
        btnKeepAwake.title = "Giữ màn hình sáng";
        return;
      }
      if (screenWakeLock && !screenWakeLock.released) {
        btnKeepAwake.title = "Wake Lock đang bật — màn hình được giữ sáng";
      } else if (noSleepVideo && !noSleepVideo.paused) {
        btnKeepAwake.title = "Video fallback — màn hình được giữ sáng";
      } else if (!wakeLockApiAvailable) {
        btnKeepAwake.title = "Cần mở bằng HTTPS để Wake Lock hoạt động";
      } else {
        btnKeepAwake.title = "Đang cố giữ sáng — chạm màn hình";
      }
    }

    async function setKeepAwake(enabled) {
      keepAwakeEnabled = enabled;
      localStorage.setItem("traylink_keep_awake", enabled ? "1" : "0");

      if (enabled) {
        if (!wakeLockApiAvailable && location.protocol !== "https:") {
          const httpsUrl = httpsRemoteUrl();
          if (httpsUrl) {
            showToast("Wake Lock cần HTTPS — đang chuyển...", "success");
            stopKeepAwakeMonitor();
            window.setTimeout(() => {
              location.replace(httpsUrl);
            }, 900);
            return;
          }
        }

        const ok = await renewKeepAwake();
        if (!ok) {
          keepAwakeEnabled = false;
          localStorage.setItem("traylink_keep_awake", "0");
          stopKeepAwakeMonitor();
          const httpsUrl = httpsRemoteUrl();
          if (httpsUrl) {
            showToast("Mở link HTTPS trên Dashboard để giữ màn hình sáng", "error");
          } else {
            showToast("Không thể giữ màn hình sáng trên trình duyệt này", "error");
          }
        } else {
          startKeepAwakeMonitor();
          const via = screenWakeLock ? "Wake Lock API" : "video";
          let msg = `Đã bật giữ màn hình sáng (${via})`;
          if (isMobile()) msg += " — tắt Tiết kiệm pin nếu vẫn tắt";
          showToast(msg, "success");
        }
      } else {
        stopKeepAwakeMonitor();
        await releaseKeepAwake();
        showToast("Đã tắt giữ màn hình sáng", "success");
      }

      updateKeepAwakeButton();
    }

    async function toggleKeepAwake() {
      await setKeepAwake(!keepAwakeEnabled);
    }

    function authHeaders() {
      const headers = {};
      if (token) headers["Authorization"] = "Bearer " + token;
      return headers;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function showUploadPanel(files) {
      pendingFiles = Array.from(files);
      if (pendingFiles.length === 0) return;

      const maxMb = deckData?.max_upload_mb || 5120;
      const lines = pendingFiles.map((f) => {
        const tooBig = f.size > maxMb * 1024 * 1024;
        return `${f.name} (${formatSize(f.size)})${tooBig ? " — quá lớn!" : ""}`;
      });
      uploadFileInfo.textContent = lines.join("\n");
      uploadProgressBar.style.width = "0%";
      uploadStart.disabled = pendingFiles.some((f) => f.size > maxMb * 1024 * 1024);
      uploadOverlay.classList.remove("hidden");
    }

    function hideUploadPanel() {
      if (uploading) return;
      uploadOverlay.classList.add("hidden");
      pendingFiles = [];
      fileInput.value = "";
    }

    function uploadOne(file, openAfter) {
      return new Promise((resolve, reject) => {
        const form = new FormData();
        form.append("file", file, file.name);
        form.append("open", openAfter ? "1" : "0");

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/upload");
        const headers = authHeaders();
        for (const [k, v] of Object.entries(headers)) xhr.setRequestHeader(k, v);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            uploadProgressBar.style.width = pct + "%";
          }
        };

        xhr.onload = () => {
          let data = {};
          try { data = JSON.parse(xhr.responseText); } catch {}
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(data);
          } else {
            reject(new Error(data.error || `Lỗi ${xhr.status}`));
          }
        };
        xhr.onerror = () => reject(new Error("Lỗi mạng khi upload"));
        xhr.send(form);
      });
    }

    async function startUpload() {
      if (uploading || pendingFiles.length === 0) return;
      uploading = true;
      uploadStart.disabled = true;
      uploadCancel.disabled = true;

      const openAfter = uploadOpenAfter.checked;
      const total = pendingFiles.length;
      let done = 0;

      try {
        for (const file of pendingFiles) {
          uploadFileInfo.textContent = `Đang upload (${done + 1}/${total}): ${file.name}`;
          uploadProgressBar.style.width = "0%";
          const data = await uploadOne(file, openAfter);
          done++;
          showToast(data.message || `Đã upload ${file.name}`, "success");
          vibrate(40);
        }
        hideUploadPanel();
      } catch (err) {
        showToast(String(err.message || err), "error");
        vibrate([30, 50, 30]);
      } finally {
        uploading = false;
        uploadStart.disabled = false;
        uploadCancel.disabled = false;
        uploadOverlay.classList.add("hidden");
        pendingFiles = [];
        fileInput.value = "";
      }
    }

    function setupUpload() {
      if (deckData && deckData.upload_enabled === false) {
        btnUpload.style.display = "none";
        return;
      }

      btnUpload.addEventListener("click", () => {
        if (deckData?.require_token && !token) {
          tokenOverlay.classList.remove("hidden");
          showToast("Nhập token trước khi upload", "error");
          return;
        }
        fileInput.click();
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files?.length) showUploadPanel(fileInput.files);
      });

      uploadStart.addEventListener("click", startUpload);
      uploadCancel.addEventListener("click", hideUploadPanel);
      uploadOverlay.addEventListener("click", (e) => {
        if (e.target === uploadOverlay && !uploading) hideUploadPanel();
      });
    }

    function setupToolbar() {
      btnFullscreen.addEventListener("click", () => {
        toggleFullscreen();
      });

      btnKeepAwake.addEventListener("click", () => {
        toggleKeepAwake();
      });

      const onFullscreenChange = () => {
        updateFullscreenButton();
        if (keepAwakeEnabled) renewKeepAwake().then(updateKeepAwakeButton);
      };
      document.addEventListener("fullscreenchange", onFullscreenChange);
      document.addEventListener("webkitfullscreenchange", onFullscreenChange);

      document.addEventListener("visibilitychange", () => {
        if (keepAwakeEnabled && document.visibilityState === "visible") {
          renewKeepAwake().then(updateKeepAwakeButton);
        }
      });

      window.addEventListener("pageshow", () => {
        if (keepAwakeEnabled) renewKeepAwake().then(updateKeepAwakeButton);
      });

      const renewOnInteraction = () => {
        if (keepAwakeEnabled) renewKeepAwake().then(updateKeepAwakeButton);
      };
      document.addEventListener("pointerdown", renewOnInteraction, { passive: true });
      document.addEventListener("touchstart", renewOnInteraction, { passive: true });

      if (keepAwakeEnabled) startKeepAwakeMonitor();

      updateFullscreenButton();
      updateKeepAwakeButton();
    }

    function iconUrl(item) {
      const type = item.type || "app";
      if (item.icon && item.icon.includes(`/api/icons/${type}/`)) {
        return item.icon;
      }
      if (item.icon && item.icon.startsWith("/api/icons/") && item.icon.split("/").length === 4) {
        return item.icon;
      }
      return `/api/icons/${type}/${encodeURIComponent(item.key)}`;
    }

    function appDisplayLabel(key, path) {
      if (path) {
        const match = path.match(/([^/\\]+?)(?:\.app|\.exe)?$/i);
        if (match && match[1] && match[1] !== key) return match[1];
      }
      return key.replace(/_/g, " ");
    }

    function cmdIcon() {
      return `<svg class="fallback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>`;
    }

    function defaultIcon() {
      return `<svg class="fallback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/>
      </svg>`;
    }

    async function fetchServerStatus() {
      try {
        const res = await fetch("/status");
        if (res.ok) serverStatus = await res.json();
      } catch {}
    }

    async function fetchDeck() {
      const res = await fetch("/api/deck");
      if (!res.ok) throw new Error("Không tải được danh sách app");
      return res.json();
    }

    async function trigger(type, key, url) {
      if (keepAwakeEnabled) renewKeepAwake();

      const tile = document.querySelector(`[data-key="${key}"][data-type="${type}"]`);
      if (tile) tile.classList.add("pressed");

      try {
        let res;
        if (deckData.allow_get) {
          const qs = new URLSearchParams({ [type === "app" ? "app" : "cmd"]: key });
          if (type === "app" && url) qs.set("url", url);
          if (token) qs.set("token", token);
          res = await fetch(`/${type === "app" ? "open-app" : "exec"}?${qs}`);
        } else {
          const headers = { "Content-Type": "application/json" };
          if (token) headers["Authorization"] = "Bearer " + token;
          const body = type === "app"
            ? { app: key, ...(url ? { url } : {}) }
            : { cmd: key };
          res = await fetch(`/${type === "app" ? "open-app" : "exec"}`, {
            method: "POST",
            headers,
            body: JSON.stringify(body),
          });
        }

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || data.message || `Lỗi ${res.status}`);

        vibrate(50);
        if (tile) {
          tile.classList.remove("pressed");
          tile.classList.add("success");
          setTimeout(() => tile.classList.remove("success"), 600);
        }
        showToast(data.message || "Đã gửi lệnh", "success");
      } catch (err) {
        vibrate([30, 50, 30]);
        if (tile) {
          tile.classList.remove("pressed");
          tile.classList.add("error");
          setTimeout(() => tile.classList.remove("error"), 800);
        }
        showToast(String(err.message || err), "error");
      }
    }

    function renderTile(item) {
      const type = item.type || "app";
      const label = item.label || item.key;
      const src = iconUrl(item);
      const iconHtml = `<img src="${src}" alt="" loading="eager" decoding="async" />`;

      return `
        <button class="tile" data-key="${item.key}" data-type="${type}" aria-label="${label}">
          <div class="tile-inner">${iconHtml}</div>
          <span class="tile-label">${label}</span>
        </button>`;
    }

    function render(deck) {
      const items = deck.items || [];
      const apps = deck.apps || [];
      const commands = deck.commands || [];
      const deckItems = items.length
        ? items
        : [
            ...apps.map((item) => ({ ...item, type: "app" })),
            ...commands.map((item) => ({ ...item, type: "cmd" })),
          ];

      if (deckItems.length === 0) {
        appEl.innerHTML = `
          <div class="header">
            <h1><span class="status-dot"></span>TrayLink Remote</h1>
          </div>
          <div class="empty">Chưa có app hoặc lệnh nào.<br/>Thêm trong Dashboard → Apps & Commands.</div>`;
        return;
      }

      appEl.innerHTML = `
        <div class="header">
          <h1><span class="status-dot"></span>TrayLink Remote</h1>
        </div>
        <div class="grid">${deckItems.map((item) => renderTile(item)).join("")}</div>`;

      appEl.querySelectorAll(".tile").forEach(tile => {
        tile.addEventListener("click", () => {
          const key = tile.dataset.key;
          const type = tile.dataset.type;
          const app = deckItems.find((item) => item.type === "app" && item.key === key);
          trigger(type, key, app?.url);
        });
      });

      appEl.querySelectorAll(".tile img").forEach(img => {
        img.addEventListener("error", () => {
          const tile = img.closest(".tile");
          const type = tile?.dataset.type || "app";
          img.outerHTML = type === "cmd" ? cmdIcon() : defaultIcon();
        });
      });
    }

    async function init() {
      try {
        await fetchServerStatus();
        updateInstallButton();

        if (maybeRedirectToHttps()) return;

        deckData = await fetchDeck();

        if (deckData.require_token && !token) {
          tokenOverlay.classList.remove("hidden");
          tokenSubmit.onclick = () => {
            persistToken(tokenInput.value);
            if (!token) return;
            tokenOverlay.classList.add("hidden");
            render(deckData);
            setupUpload();
          };
          tokenInput.addEventListener("keydown", e => {
            if (e.key === "Enter") tokenSubmit.click();
          });
          return;
        }

        if (location.protocol === "https:") markHttpsPreferred();
        render(deckData);
        setupUpload();
        if (keepAwakeEnabled) {
          renewKeepAwake().then(updateKeepAwakeButton);
        }
      } catch (err) {
        appEl.innerHTML = `
          <div class="header">
            <h1><span class="status-dot offline"></span>TrayLink Remote</h1>
          </div>
          <div class="empty">${err.message || "Không kết nối được server"}</div>`;
      }
    }

    setupToolbar();
    setupPwaInstall();
    init();
  </script>
</body>
</html>
