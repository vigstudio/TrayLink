name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: universal
            artifact: traylink-macos-universal
            zip_name: TrayLink-macos-universal.zip
          - target: arm64
            artifact: traylink-macos-arm64
            zip_name: TrayLink-macos-arm64.zip
          - target: x64
            artifact: traylink-macos-x64
            zip_name: TrayLink-macos-x64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: macos-${{ matrix.target }}

      - name: Build macOS (${{ matrix.target }})
        run: bash scripts/build-macos.sh ${{ matrix.target }}

      - name: Upload macOS artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/macos/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Windows
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: traylink-windows
          path: release/windows/
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS universal
        uses: actions/download-artifact@v4
        with:
          name: traylink-macos-universal
          path: dist/macos-universal

      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: traylink-macos-arm64
          path: dist/macos-arm64

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: traylink-macos-x64
          path: dist/macos-x64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: traylink-windows
          path: dist/windows

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          for spec in \
            "dist/macos-universal:TrayLink-macos-universal.zip" \
            "dist/macos-arm64:TrayLink-macos-arm64.zip" \
            "dist/macos-x64:TrayLink-macos-x64.zip"; do
            dir="${spec%%:*}"
            zip_name="${spec##*:}"
            if [ -d "$dir/TrayLink.app" ]; then
              (cd "$dir" && zip -r "../../release-assets/$zip_name" TrayLink.app)
            fi
            shopt -s nullglob
            for dmg in "$dir"/*.dmg; do
              cp "$dmg" release-assets/
            done
          done
          find dist/windows -type f -iname "*setup.exe" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
